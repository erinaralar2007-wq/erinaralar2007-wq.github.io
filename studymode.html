<!DOCTYPE html>
<html class="studyHtml">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Level 3 STEM Guide | Study Mode</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
  <link rel="icon" type="image/x-icon" href="assets/siteLogoStudy.png">
</head>
<body class="studyPage">
  <article>
    <button id="settings" type="button"><img src="assets/icons8-settings-50.png" height="50" width="50" alt="Settings gear icon"><br>Settings</button>
    <button id="back-to-settings" type="button">Back to settings</button>
    
    <section id="page">
      <div id="mobile-settings">
        <button id="back" type="button">Back</button>
        <button id="tasks-nav-button" type="button">Tasks</button>
        <button id="audio-nav-button" type="button">Audio</button>
        <div class="settings-credit"><a target="_blank" href="https://icons8.com/icon/2969/settings">Settings</a> icon by <a target="_blank" href="https://icons8.com">Icons8</a></div>
      </div>
      
      <div id="pomodoro" class="flocus-timer">
        <audio id="pomodoroSound">
          <source class="sound" src="assets/ping.mp3" type="audio/mp3">
        </audio>
        
        <div class="clockBox">
          <div class="clockDisplay">
            <div class="timeDisplay">
              <span id="minutes">00</span><span id="colon">:</span><span id="seconds">00</span>
            </div>
          </div>

          <div class="startReset">
            <button id="start">Start</button>
            <button id="reset">Reset</button>
          </div>

          <div class="clockControls">
            <div class="controlsLeft">
              <span id="studyLabel">Study:</span>
              <span id="sessionTime">15 min</span>
              <div id="studyButtons">
                <button id="seshMinus" class="timeAdjust">-</button>
                <button id="seshPlus" class="timeAdjust">+</button>
              </div>
            </div>
            <div class="controlsRight">
              <span id="breakLabel">Break:</span>
              <span id="breakTime">5 min</span>
              <div id="breakButtons">
                <button id="breakMinus" class="timeAdjust">-</button>
                <button id="breakPlus" class="timeAdjust">+</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="box" id="tasks">
        <h2>Tasks List</h2>
        <div id="taskList">
          <input type="text" id="taskInput" placeholder="Add task">
          <button onclick="addTask()">+</button>
        </div>
        <ul id="tasksContainer"></ul>
      </div>

      <div class="box" id="sound">
        <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/playlist/4OA1oWfcjHQ4Z8oRt4apN1?utm_source=generator&theme=0&si=4724712c1be44398" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
      </div>
    </section>

    <img id="vinyl" src="assets/record.gif" alt="moving image of a spinning record" style="display: none !important;">
  </article>
  
  <script src="script.js" defer></script>
</body>
</html>
